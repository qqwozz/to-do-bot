name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Download dependencies
        working-directory: app
        run: go mod download

      - name: Run tests
        working-directory: app
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: app/coverage.out

  cpp-tests:
    name: C++ Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libsqlite3-dev libssl-dev libasio-dev libgtest-dev

      - name: Install Crow
        run: |
          git clone --depth 1 https://github.com/CrowCpp/Crow.git /tmp/crow
          sudo cp -r /tmp/crow/include/crow /usr/local/include/crow
          sudo cp /tmp/crow/include/crow.h /usr/local/include/crow.h
          rm -rf /tmp/crow

      - name: Build Google Test
        run: |
          cd /usr/src/gtest
          sudo cmake .
          sudo make
          sudo cp lib/*.a /usr/lib/

      - name: Build project
        run: |
          cd app/cpp-backend
          mkdir -p build && cd build
          cmake .. -DCROW_INCLUDE_DIR=/usr/local/include -DBUILD_TESTS=ON
          make -j$(nproc)

      - name: Build tests
        run: |
          cd app/cpp-backend/tests
          mkdir -p build && cd build
          cmake .. -DCROW_INCLUDE_DIR=/usr/local/include && make -j$(nproc)

      - name: Run tests
        run: |
          cd app/cpp-backend/tests/build
          ./database_tests

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run gofmt
        working-directory: app
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Files not formatted:"
            gofmt -l .
            exit 1
          fi

      - name: Run go vet
        working-directory: app
        run: go vet ./...

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [go-tests, cpp-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend
        run: |
          cd app/cpp-backend
          docker build -t todo-backend:test .

      - name: Build bot
        run: docker build -t todo-bot:test .
