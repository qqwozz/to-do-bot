name: CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'go', 'cpp' ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install C++ dependencies
        if: matrix.language == 'cpp'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libsqlite3-dev libssl-dev libasio-dev

      - name: Install Crow
        if: matrix.language == 'cpp'
        run: |
          git clone --depth 1 https://github.com/CrowCpp/Crow.git /tmp/crow
          sudo cp -r /tmp/crow/include/crow /usr/local/include/crow
          sudo cp /tmp/crow/include/crow.h /usr/local/include/crow.h
          rm -rf /tmp/crow

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Build C++ project
        if: matrix.language == 'cpp'
        run: |
          cd cpp-backend
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCROW_INCLUDE_DIR=/usr/local/include
          make -j$(nproc)

      - name: Autobuild
        if: matrix.language == 'go'
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
