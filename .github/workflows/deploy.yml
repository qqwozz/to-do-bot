name: Deploy

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build backend
        run: |
          cd app/cpp-backend
          docker build -t todo-backend:latest .

      - name: Build bot
        run: docker build -t todo-bot:latest .
