name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [go-tests, cpp-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Build and push Docker images
        run: |
          echo "Build backend..."
          cd cpp-backend && docker build -t todo-backend:latest .
          echo "Build bot..."
          cd .. && docker build -t todo-bot:latest .
          echo "Done!"

